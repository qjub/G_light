<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BEAM — G-Light</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-bright: #f0c040;
      --black: #080808;
      --red: #e63946;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; overflow:hidden;
      background:#080808; touch-action:none;
    }
    body {
      font-family:'Barlow',sans-serif; color:#fff;
      display:flex; align-items:center; justify-content:center;
    }
    canvas { display:block; touch-action:none; }

    /* SCREENS */
    .screen {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:24px; z-index:10;
    }
    .screen.hidden { display:none !important; }

    /* INTRO */
    #introScreen {
      background:radial-gradient(ellipse at 50% 35%, rgba(201,168,76,0.08) 0%, #080808 65%);
    }
    .game-logo {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(52px,13vw,110px);
      letter-spacing:10px; color:var(--gold);
      line-height:1; text-align:center;
    }
    .game-sub {
      font-size:clamp(9px,2vw,12px); letter-spacing:5px;
      text-transform:uppercase; color:#444;
      margin-top:6px; text-align:center;
    }
    .nick-wrap {
      margin-top:40px; width:100%; max-width:340px;
      display:flex; flex-direction:column; align-items:center; gap:12px;
    }
    .nick-label { font-size:9px; letter-spacing:4px; text-transform:uppercase; color:#444; }
    #nickInput {
      width:100%; background:transparent;
      border:none; border-bottom:1px solid rgba(201,168,76,0.35);
      padding:10px 4px;
      font-family:'Bebas Neue',sans-serif; font-size:26px;
      letter-spacing:4px; color:var(--gold); text-align:center; outline:none;
      transition:border-color .2s;
    }
    #nickInput::placeholder { color:#2a2a2a; }
    #nickInput:focus { border-color:var(--gold); }
    .btn-start {
      width:100%; margin-top:8px; padding:15px;
      background:var(--gold); color:#080808;
      font-family:'Bebas Neue',sans-serif; font-size:21px; letter-spacing:4px;
      border:none; cursor:pointer; transition:background .15s, transform .1s;
    }
    .btn-start:hover { background:var(--gold-bright); }
    .btn-start:active { transform:scale(.98); }
    .controls-hint {
      margin-top:24px; display:flex; gap:20px;
      flex-wrap:wrap; justify-content:center;
    }
    .hint {
      font-size:9px; letter-spacing:3px; text-transform:uppercase; color:#333;
      display:flex; align-items:center; gap:6px;
    }
    .hint-key {
      border:1px solid #2a2a2a; padding:2px 7px;
      font-family:'Bebas Neue',sans-serif; font-size:12px; color:#555;
    }

    /* HUD */
    #hud {
      position:fixed; top:0; left:0; right:0;
      padding:14px 20px;
      display:flex; align-items:center; justify-content:space-between;
      z-index:5; pointer-events:none;
    }
    #hud.hidden { display:none; }
    .hud-logo {
      font-family:'Bebas Neue',sans-serif; font-size:16px;
      letter-spacing:4px; color:var(--gold); opacity:.5;
    }
    .hud-timer {
      font-family:'Bebas Neue',sans-serif; font-size:44px;
      letter-spacing:2px; color:#fff; line-height:1;
    }
    .hud-buff {
      font-family:'Bebas Neue',sans-serif; font-size:13px;
      letter-spacing:3px; color:var(--gold); opacity:0;
      transition:opacity .3s; text-transform:uppercase; text-align:right;
    }
    .hud-buff.on { opacity:1; }

    /* MOBILE CONTROLS */
    #mobileCtrl {
      position:fixed; bottom:0; left:0; right:0;
      padding:16px 28px 32px;
      display:none; justify-content:space-between; align-items:center;
      z-index:5;
    }
    #mobileCtrl.show { display:flex; }
    .mob-btn {
      width:88px; height:88px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Bebas Neue',sans-serif; font-size:44px; line-height:1;
      color:rgba(201,168,76,0.4);
      pointer-events:all; user-select:none;
      -webkit-user-select:none; touch-action:none;
      transition:color .1s;
    }
    .mob-btn.pressed { color:var(--gold-bright); }

    /* DEATH SCREEN */
    #deathScreen { background:rgba(8,8,8,.97); overflow-y:auto; }
    .death-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(44px,10vw,86px);
      letter-spacing:6px; color:var(--red);
      text-align:center; line-height:1;
    }
    .death-sub {
      font-size:10px; letter-spacing:4px; text-transform:uppercase;
      color:#333; margin-top:6px; text-align:center;
    }
    .death-stats {
      display:flex; align-items:center; justify-content:center;
      margin-top:36px; border:1px solid rgba(201,168,76,0.15);
    }
    .death-stat { padding:24px 28px; text-align:center; flex:1; }
    .death-stat-val {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(34px,6vw,62px);
      color:var(--gold); letter-spacing:3px; line-height:1;
    }
    .death-stat-lbl {
      font-size:9px; letter-spacing:3px; text-transform:uppercase;
      color:#444; margin-top:6px;
    }
    .death-divider { width:1px; height:70px; background:rgba(201,168,76,0.15); flex-shrink:0; }
    .death-msg {
      font-family:'Bebas Neue',sans-serif; font-size:17px;
      letter-spacing:3px; color:var(--gold);
      text-align:center; margin-top:18px; min-height:26px;
    }
    .death-actions {
      margin-top:24px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
    }
    .btn-action {
      padding:13px 30px; font-family:'Bebas Neue',sans-serif;
      font-size:17px; letter-spacing:3px; border:none; cursor:pointer;
      transition:background .15s, transform .1s;
    }
    .btn-action:active { transform:scale(.97); }
    .btn-p { background:var(--gold); color:#080808; }
    .btn-p:hover { background:var(--gold-bright); }
    .btn-s { background:transparent; color:#444; border:1px solid #222; }
    .btn-s:hover { border-color:#444; color:#888; }
    @media (max-width:500px) {
      .death-stats { flex-direction:column; }
      .death-divider { width:80%; height:1px; margin:0 auto; }
      .death-stat { padding:16px 20px; }
    }

    /* X CLOSE BUTTON */
    .close-btn {
      position:fixed; top:0; right:0; z-index:200;
      padding:14px 18px;
      font-family:'Bebas Neue',sans-serif; font-size:24px;
      color:var(--gold); text-decoration:none;
      pointer-events:all; opacity:0; transition:opacity .3s;
    }
    .close-btn.visible { opacity:1; }

    /* FLASH */
    #flash {
      position:fixed; inset:0; background:#fff;
      opacity:0; pointer-events:none; z-index:8;
    }
  </style>
</head>
<body>

<a href="index.html" class="close-btn" id="closeBtn">✕</a>
<div id="flash"></div>
<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-logo">G-LIGHT</div>
  <div class="hud-timer" id="hudTimer">0.0</div>
  <div class="hud-buff" id="hudBuff">⚡ FULL BEAM</div>
</div>

<!-- MOBILE CONTROLS -->
<div id="mobileCtrl">
  <div class="mob-btn" id="btnL">←</div>
  <div class="mob-btn" id="btnR">→</div>
</div>

<!-- INTRO -->
<div class="screen" id="introScreen">
  <div class="game-logo">BEAM</div>
  <div class="game-sub">G-Light · Prežij tmu · Zbieraj 🍬</div>
  <div class="nick-wrap">
    <div class="nick-label">Tvoj nick (nepovinné)</div>
    <input id="nickInput" type="text" maxlength="16" placeholder="ANON" autocomplete="off" spellcheck="false">
    <button class="btn-start" id="btnStart">ŠTART — ZHASNI SVETLÁ</button>
  </div>
  <div class="controls-hint">
    <div class="hint"><span class="hint-key">←</span><span class="hint-key">→</span> pohyb</div>
    <div class="hint"><span class="hint-key">A</span><span class="hint-key">D</span> pohyb</div>
    <div class="hint">🍬 cukor = +10s svetlo</div>
  </div>
</div>

<!-- DEATH -->
<div class="screen hidden" id="deathScreen">
  <div class="death-title">SVETLO ZHASLO</div>
  <div class="death-sub">G-Light čakal. Ty nie si prišiel.</div>
  <div class="death-stats">
    <div class="death-stat">
      <div class="death-stat-val" id="deathTime">0.0</div>
      <div class="death-stat-lbl">sekúnd prežitých</div>
    </div>
    <div class="death-divider"></div>
    <div class="death-stat">
      <div class="death-stat-val" id="deathSugars">0</div>
      <div class="death-stat-lbl">🍬 boostov zobraných</div>
    </div>
    <div class="death-divider"></div>
    <div class="death-stat">
      <div class="death-stat-val" id="deathBeam">0s</div>
      <div class="death-stat-lbl">max beam čas</div>
    </div>
  </div>
  <div class="death-msg" id="deathMsg"></div>
  <div class="death-actions">
    <button class="btn-action btn-p" id="btnRetry">ZNOVA</button>
    <button class="btn-action btn-s" id="btnMenu">MENU</button>
  </div>
</div>

<script>
// ══════════════════════════════
//  CANVAS
// ══════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let   W = 0, H = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (state === 'playing') {
    G.roadW = Math.min(W * 0.75, 500);
    G.laneW = G.roadW / 3;
    G.roadX = (W - G.roadW) / 2;
    G.carY  = H * 0.72;
    G.carX  = Math.max(G.roadX + G.carW/2 + 4,
               Math.min(G.roadX + G.roadW - G.carW/2 - 4, G.carX));
  }
}
window.addEventListener('resize', resize);

// ══════════════════════════════
//  STATE
// ══════════════════════════════
let state = 'intro';
let nick  = 'ANON';
const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

const G = {
  roadW:0, laneW:0, roadX:0,
  stripeY:0,
  carX:0, carY:0, carW:0, carH:0, carSpeed:0,
  beamOn:false, beamTimer:0, maxBeam:0,
  obs:[], sugars:[], sugarsCollected:0,
  elapsed:0,
  speed:0,
  BASE_SPEED: 180,
  MAX_SPEED:  560,
  obsTimer:0, obsInterval:0,
  sugarTimer:0, sugarInterval:0,
  flashAlpha:0,
  lives:3, hitCooldown:0,
};

// ══════════════════════════════
//  INPUT
// ══════════════════════════════
const keys = { left:false, right:false };
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft'  || e.key==='a' || e.key==='A') keys.left  = true;
  if (e.key==='ArrowRight' || e.key==='d' || e.key==='D') keys.right = true;
});
document.addEventListener('keyup', e => {
  if (e.key==='ArrowLeft'  || e.key==='a' || e.key==='A') keys.left  = false;
  if (e.key==='ArrowRight' || e.key==='d' || e.key==='D') keys.right = false;
});

const btnL = document.getElementById('btnL');
const btnR = document.getElementById('btnR');
function mob(btn, dir, down) {
  keys[dir] = down;
  btn.classList.toggle('pressed', down);
}
['touchstart','touchend','touchcancel'].forEach(ev => {
  const down = ev === 'touchstart';
  btnL.addEventListener(ev, e => { e.preventDefault(); mob(btnL,'left',  down); }, {passive:false});
  btnR.addEventListener(ev, e => { e.preventDefault(); mob(btnR,'right', down); }, {passive:false});
});

// ══════════════════════════════
//  INIT
// ══════════════════════════════
function initGame() {
  resize(); // ensures W/H are fresh

  G.roadW = Math.min(W * 0.75, 500);
  G.laneW = G.roadW / 3;
  G.roadX = (W - G.roadW) / 2;
  G.stripeY = 0;

  G.carW = isMobile ? 34 : 42;
  G.carH = isMobile ? 58 : 72;
  G.carX = W / 2;
  G.carY = H * 0.72;
  G.carSpeed = isMobile ? 260 : 320;

  G.beamOn  = false;
  G.beamTimer = 0;
  G.maxBeam = 0;
  G.obs     = [];
  G.sugars  = [];
  G.sugarsCollected = 0;
  G.elapsed = 0;
  G.speed   = G.BASE_SPEED;

  G.obsTimer    = 0;
  G.obsInterval = 1.6;  // štart pomalší

  G.sugarTimer    = 0;
  G.sugarInterval = 8;  // prvý sugar za 8s

  G.flashAlpha  = 0;
  G.lives       = 3;
  G.hitCooldown = 0;
  G.lastLanes   = [];
  G.obsCount    = 0;

  keys.left = false;
  keys.right = false;

  document.getElementById('flash').style.opacity = 0;
}

// ══════════════════════════════
//  SPAWN
// ══════════════════════════════
function spawnObs() {
  // forced variety — track last 2 lanes, force different lane occasionally
  if (!G.lastLanes) G.lastLanes = [];

  let lane;
  // after 10s, force player's lane every 4th obstacle
  G.obsCount = (G.obsCount || 0) + 1;
  if (G.elapsed > 10 && G.obsCount % 4 === 0) {
    // aim at player's current lane
    lane = Math.floor((G.carX - G.roadX) / G.laneW);
    lane = Math.max(0, Math.min(2, lane));
  } else {
    // random but avoid repeating same lane 3x in a row
    const tries = [0,1,2].sort(() => Math.random()-0.5);
    lane = tries.find(l => G.lastLanes.slice(-2).indexOf(l) === -1) ?? tries[0];
  }
  G.lastLanes.push(lane);
  if (G.lastLanes.length > 3) G.lastLanes.shift();

  const x    = G.roadX + lane * G.laneW + G.laneW / 2;
  const r    = Math.random();
  const type = r < 0.5 ? 'car' : r < 0.75 ? 'pothole' : 'truck';

  // widths relative to laneW — no hiding on lane center
  const w = type==='truck'   ? G.laneW * 0.88
          : type==='car'     ? G.laneW * 0.72
          :                    G.laneW * 0.60;  // pothole
  const h = type==='truck' ? 100 : type==='car' ? 66 : 22;

  // small random offset within lane so center-camping doesn't work
  const maxOffset = G.laneW * 0.12;
  const xOffset = (Math.random() - 0.5) * 2 * maxOffset;

  const maxObsSpeed = Math.min(G.speed, 480);
  const spd  = maxObsSpeed * (0.55 + Math.random() * 0.4);
  G.obs.push({ x: x + xOffset, y: -h - 10, w, h, type, speed: spd });
}

function spawnSugar() {
  // pick a lane that has no sugar already nearby
  const usedLanes = new Set(G.sugars.map(s => Math.round((s.x - G.roadX) / G.laneW)));
  const free = [0,1,2].filter(l => !usedLanes.has(l));
  const lane = free.length ? free[Math.floor(Math.random()*free.length)]
                           : Math.floor(Math.random()*3);
  const x = G.roadX + lane * G.laneW + G.laneW / 2;
  G.sugars.push({ x, y: -28, r: 15, angle: 0 });
}

// ══════════════════════════════
//  DRAW
// ══════════════════════════════
function drawRoad() {
  // asphalt
  ctx.fillStyle = '#111';
  ctx.fillRect(G.roadX, 0, G.roadW, H);
  // gutters
  ctx.fillStyle = '#090909';
  ctx.fillRect(0, 0, G.roadX, H);
  ctx.fillRect(G.roadX + G.roadW, 0, W - G.roadX - G.roadW, H);
  // edges
  ctx.strokeStyle = 'rgba(201,168,76,0.45)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(G.roadX,0);          ctx.lineTo(G.roadX,H);          ctx.stroke();
  ctx.beginPath(); ctx.moveTo(G.roadX+G.roadW,0);  ctx.lineTo(G.roadX+G.roadW,H);  ctx.stroke();
  // lane dashes
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth   = 2;
  ctx.setLineDash([50, 40]);
  ctx.lineDashOffset = -G.stripeY;
  for (let l = 1; l < 3; l++) {
    const lx = G.roadX + l * G.laneW;
    ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx,H); ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawCar(x, y, w, h, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha ?? 1;
  ctx.translate(x, y);

  const grad = ctx.createLinearGradient(-w/2,0,w/2,0);
  grad.addColorStop(0,'#1a1a2e');
  grad.addColorStop(0.5,'#2a2a4a');
  grad.addColorStop(1,'#1a1a2e');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.roundRect(-w/2,-h/2,w,h,6); ctx.fill();

  ctx.strokeStyle = 'rgba(201,168,76,0.55)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(-w/2,-h/2,w,h,6); ctx.stroke();

  ctx.fillStyle = 'rgba(100,180,255,0.12)';
  ctx.fillRect(-w/2+5, -h/2+7, w-10, h*0.26);

  // headlights
  ctx.fillStyle = G.beamOn ? '#fff8dc' : 'rgba(255,240,150,0.55)';
  ctx.shadowColor = G.beamOn ? '#fffbe0' : '#ffd700';
  ctx.shadowBlur  = G.beamOn ? 20 : 7;
  ctx.fillRect(-w/2+5, -h/2+2, 10, 7);
  ctx.fillRect(w/2-15,  -h/2+2, 10, 7);
  ctx.shadowBlur = 0;

  // tail lights
  ctx.fillStyle = '#ff3333';
  ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 5;
  ctx.fillRect(-w/2+4, h/2-9, 9, 6);
  ctx.fillRect(w/2-13,  h/2-9, 9, 6);
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawObs(o) {
  ctx.save();
  ctx.translate(o.x, o.y);

  if (o.type === 'pothole') {
    const rg = ctx.createRadialGradient(0,0,1, 0,0,o.w/2);
    rg.addColorStop(0,'#040404');
    rg.addColorStop(1,'rgba(18,18,18,0.3)');
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.ellipse(0, 0, o.w/2, o.h/2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(90,90,90,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();

  } else if (o.type === 'truck') {
    const grad = ctx.createLinearGradient(-o.w/2,0,o.w/2,0);
    grad.addColorStop(0,'#1c1c1c'); grad.addColorStop(0.5,'#2c2c2c'); grad.addColorStop(1,'#1c1c1c');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(-o.w/2,-o.h/2,o.w,o.h,4); ctx.fill();
    ctx.strokeStyle = '#e63946'; ctx.lineWidth = 2;
    ctx.strokeRect(-o.w/2,-o.h/2,o.w,o.h);
    ctx.fillStyle = '#ff3333'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=8;
    ctx.fillRect(-o.w/2+4, o.h/2-8, 13, 6);
    ctx.fillRect(o.w/2-17,  o.h/2-8, 13, 6);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(230,57,70,0.18)';
    for (let i = -3; i < 4; i++) ctx.fillRect(i*16-7, -o.h/2, 8, o.h);

  } else {
    // oncoming car
    const grad = ctx.createLinearGradient(-o.w/2,0,o.w/2,0);
    grad.addColorStop(0,'#1f1f35'); grad.addColorStop(0.5,'#2d2d50'); grad.addColorStop(1,'#1f1f35');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(-o.w/2,-o.h/2,o.w,o.h,5); ctx.fill();
    ctx.strokeStyle='rgba(100,100,200,0.25)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(-o.w/2,-o.h/2,o.w,o.h,5); ctx.stroke();
    ctx.fillStyle='#ffffee'; ctx.shadowColor='#fff'; ctx.shadowBlur=18;
    ctx.fillRect(-o.w/2+5, o.h/2-9, 10, 7);
    ctx.fillRect(o.w/2-15,  o.h/2-9, 10, 7);
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function drawSugar(s) {
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.angle);

  // pulse glow so player can spot it in dark
  const pulse = 0.25 + 0.15 * Math.sin(performance.now() * 0.004);
  const rg = ctx.createRadialGradient(0,0,2, 0,0,s.r*2.5);
  rg.addColorStop(0, `rgba(201,168,76,${pulse + 0.2})`);
  rg.addColorStop(1, 'rgba(201,168,76,0)');
  ctx.fillStyle = rg;
  ctx.beginPath(); ctx.arc(0,0,s.r*2.5,0,Math.PI*2); ctx.fill();

  ctx.font = `${s.r*1.7}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🍬', 0, 1);

  ctx.restore();
}

function drawBeam() {
  if (!G.beamOn) return;
  const cx = G.carX, cy = G.carY - G.carH/2;
  const grad = ctx.createLinearGradient(cx, cy, cx, cy - H);
  grad.addColorStop(0,   'rgba(255,250,200,0.22)');
  grad.addColorStop(0.5, 'rgba(255,245,180,0.07)');
  grad.addColorStop(1,   'rgba(255,245,180,0)');
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx - G.carW/2 + 6, cy);
  ctx.lineTo(cx - G.roadW * 0.44, 0);
  ctx.lineTo(cx + G.roadW * 0.44, 0);
  ctx.lineTo(cx + G.carW/2 - 6,  cy);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

function drawDarkness() {
  if (G.beamOn) {
    // light vignette only
    const rg = ctx.createRadialGradient(G.carX, G.carY, H*0.28, G.carX, G.carY, H*0.88);
    rg.addColorStop(0,'rgba(0,0,0,0)');
    rg.addColorStop(1,'rgba(0,0,0,0.6)');
    ctx.save(); ctx.fillStyle = rg; ctx.fillRect(0,0,W,H); ctx.restore();
    return;
  }
  // heavy dark, small cone cutout
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.91)';
  ctx.fillRect(0,0,W,H);

  const focusX = G.carX;
  const focusY = G.carY - G.carH * 0.45;
  const visR   = Math.min(W,H) * 0.2;

  const rg = ctx.createRadialGradient(focusX, focusY, 0, focusX, focusY, visR);
  rg.addColorStop(0,   'rgba(0,0,0,0)');
  rg.addColorStop(0.55,'rgba(0,0,0,0)');
  rg.addColorStop(1,   'rgba(0,0,0,1)');
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = rg;
  ctx.beginPath(); ctx.arc(focusX, focusY, visR, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawLives() {
  ctx.save();
  ctx.font = '18px serif';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < 3; i++) {
    ctx.globalAlpha = i < G.lives ? 1 : 0.12;
    ctx.fillText('💡', W - 30 - i*28, 22);
  }
  ctx.restore();
}

// ══════════════════════════════
//  COLLISION helpers
// ══════════════════════════════
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = Math.max(rx - rw/2, Math.min(rx + rw/2, cx));
  const nearY = Math.max(ry - rh/2, Math.min(ry + rh/2, cy));
  const dx = cx - nearX, dy = cy - nearY;
  return dx*dx + dy*dy < cr*cr;
}

function rectsOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax-aw/2 < bx+bw/2 && ax+aw/2 > bx-bw/2 &&
         ay-ah/2 < by+bh/2 && ay+ah/2 > by-bh/2;
}

// ══════════════════════════════
//  GAME LOOP
// ══════════════════════════════
let lastT = 0;
let rafId = null;

function loop(ts) {
  if (state !== 'playing') return;
  const dt = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;

  // ── UPDATE ──

  G.elapsed += dt;
  // no speed ceiling — keeps getting harder forever
  G.speed = G.BASE_SPEED + G.elapsed * 5 + G.elapsed * G.elapsed * 0.06;
  G.stripeY = (G.stripeY + Math.min(G.speed, 800) * dt) % 90;

  if (G.hitCooldown > 0) G.hitCooldown -= dt;

  // beam countdown
  if (G.beamOn) {
    G.beamTimer -= dt;
    if (G.beamTimer <= 0) {
      G.beamOn = false;
      G.beamTimer = 0;
      document.getElementById('hudBuff').classList.remove('on');
    } else {
      document.getElementById('hudBuff').textContent = `⚡ FULL BEAM ${G.beamTimer.toFixed(1)}s`;
    }
  }

  // car move
  if (keys.left)  G.carX = Math.max(G.roadX + G.carW/2 + 4,              G.carX - G.carSpeed * dt);
  if (keys.right) G.carX = Math.min(G.roadX + G.roadW - G.carW/2 - 4,    G.carX + G.carSpeed * dt);

  // spawn obstacles — interval shrinks with time, floor 0.4s
  G.obsTimer += dt;
  if (G.obsTimer >= G.obsInterval) {
    G.obsTimer = 0;
    G.obsInterval = Math.max(0.4, 1.6 - G.elapsed * 0.018);
    spawnObs();
    // double spawn only after 30s, 25% chance
    if (G.elapsed > 30 && Math.random() < 0.25) {
      G.obsTimer = -0.18;
      spawnObs();
    }
  }

  // spawn sugar
  G.sugarTimer += dt;
  if (G.sugarTimer >= G.sugarInterval) {
    G.sugarTimer = 0;
    spawnSugar();
  }

  // update obstacles
  for (let i = G.obs.length - 1; i >= 0; i--) {
    const o = G.obs[i];
    o.y += o.speed * dt;
    if (o.y - o.h/2 > H + 20) { G.obs.splice(i,1); continue; }

    if (G.hitCooldown <= 0) {
      let hit = false;
      if (o.type === 'pothole') {
        hit = circleRect(G.carX, G.carY, G.carW * 0.45, o.x, o.y, o.w * 0.82, o.h * 0.82);
      } else {
        hit = rectsOverlap(G.carX, G.carY, G.carW*0.85, G.carH*0.68, o.x, o.y, o.w*0.85, o.h*0.75);
      }
      if (hit) {
        G.lives--;
        G.hitCooldown = 0.8;
        if (o.type === 'car') {
          // flash from oncoming headlights
          G.flashAlpha = 0.85;
          document.getElementById('flash').style.opacity = G.flashAlpha;
        }
        G.obs.splice(i, 1);
        if (G.lives <= 0) { endGame(); return; }
      }
    }
  }

  // update sugars
  for (let i = G.sugars.length - 1; i >= 0; i--) {
    const s = G.sugars[i];
    s.y     += G.speed * 0.52 * dt;
    s.angle += dt * 1.8;
    if (s.y - s.r > H + 20) { G.sugars.splice(i,1); continue; }

    const dx = G.carX - s.x, dy = G.carY - s.y;
    if (Math.sqrt(dx*dx + dy*dy) < s.r + G.carW * 0.48) {
      G.sugarsCollected++;
      // cap beam stack at 20s — no infinite light exploit
      G.beamTimer = Math.min((G.beamOn ? G.beamTimer : 0) + 10, 20);
      if (G.beamTimer > G.maxBeam) G.maxBeam = G.beamTimer;
      G.beamOn = true;
      const buffEl = document.getElementById('hudBuff');
      buffEl.classList.add('on');
      buffEl.textContent = `⚡ FULL BEAM ${G.beamTimer.toFixed(1)}s`;
      G.sugars.splice(i,1);
    }
  }

  // flash decay
  if (G.flashAlpha > 0) {
    G.flashAlpha = Math.max(0, G.flashAlpha - dt * 2.5);
    document.getElementById('flash').style.opacity = G.flashAlpha;
  }

  // HUD
  document.getElementById('hudTimer').textContent = G.elapsed.toFixed(1);

  // ── DRAW ──
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#060606';
  ctx.fillRect(0,0,W,H);

  drawRoad();
  drawBeam();
  G.sugars.forEach(drawSugar);
  G.obs.forEach(drawObs);

  const blink = G.hitCooldown <= 0 || Math.floor(G.hitCooldown * 9) % 2 === 0;
  if (blink) drawCar(G.carX, G.carY, G.carW, G.carH);

  drawDarkness();
  drawLives();

  rafId = requestAnimationFrame(loop);
}

// ══════════════════════════════
//  START / END
// ══════════════════════════════
function startGame() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  nick  = (document.getElementById('nickInput').value.trim() || 'ANON').toUpperCase();
  state = 'playing';
  document.getElementById('introScreen').classList.add('hidden');
  document.getElementById('deathScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('closeBtn').classList.remove('visible');
  if (isMobile) document.getElementById('mobileCtrl').classList.add('show');
  initGame();
  lastT = performance.now();
  rafId = requestAnimationFrame(loop);
}

function endGame() {
  state = 'dead';
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }

  keys.left = false; keys.right = false;

  const score  = parseFloat(G.elapsed.toFixed(1));
  const sugars = G.sugarsCollected;
  const maxB   = G.maxBeam > 0 ? G.maxBeam.toFixed(0) + 's' : '0s';

  document.getElementById('hud').classList.add('hidden');
  document.getElementById('mobileCtrl').classList.remove('show');
  document.getElementById('deathTime').textContent   = score.toFixed(1);
  document.getElementById('deathSugars').textContent = sugars;
  document.getElementById('deathBeam').textContent   = maxB;

  const msg = document.getElementById('deathMsg');
  if      (score < 8)  msg.textContent = 'Začiatočník. G-Light by plakal.';
  else if (score < 20) msg.textContent = 'Nie zlé. Skús znova.';
  else if (score < 40) msg.textContent = 'Solidné. Tma ťa skoro nechytila.';
  else if (score < 70) msg.textContent = '🏆 Legenda tmy. Respekt.';
  else                 msg.textContent = '👑 G-Light by bol hrdý.';

  document.getElementById('closeBtn').classList.add('visible');
  document.getElementById('deathScreen').classList.remove('hidden');
}

// ══════════════════════════════
//  BUTTONS
// ══════════════════════════════
document.getElementById('btnStart').addEventListener('click', startGame);
document.getElementById('nickInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame();
});
document.getElementById('btnRetry').addEventListener('click', startGame);
document.getElementById('btnMenu').addEventListener('click', () => {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  state = 'intro';
  keys.left = false; keys.right = false;
  document.getElementById('deathScreen').classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('mobileCtrl').classList.remove('show');
  document.getElementById('closeBtn').classList.remove('visible');
  document.getElementById('introScreen').classList.remove('hidden');
});

// ══════════════════════════════
//  BOOT
// ══════════════════════════════
resize(); // safe now that state is declared
</script>
